<!DOCTYPE html>
<html lang="es">
<head>
    <title>IParking</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/neon/96/experimental-car-neon.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/neon/180/experimental-car-neon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        
        #info-panel { 
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 20, 20, 0.95); color: #0ff; padding: 12px;
            border-radius: 12px; border: 1px solid #0ff; font-family: monospace;
            font-size: 11px; z-index: 1000; text-align: center; width: 90%;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        .controls { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; flex-direction: column; gap: 8px; padding: 0 12px; z-index: 1000; }
        .row { display: flex; justify-content: space-around; gap: 8px; }
        button { background: #0ff; color: #000; border: none; height: 50px; flex: 1; font-weight: bold; border-radius: 8px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .btn-sec { background: #1a1a1a; color: #0ff; border: 1px solid #0ff; }
        .btn-danger { background: #1a1a1a; color: #ff4444; border: 1px solid #ff4444; }
        button:active { transform: scale(0.9); }

        .gas-label { background: #0ff; color: #000; border-radius: 4px; padding: 2px 5px; font-weight: bold; border: 1px solid #000; font-size: 10px; }
    </style>
</head>
<body>
    <div id="info-panel">
        <div id="address">📍 Localizando...</div>
        <div id="status">🛰️ GPS OK | <span id="dist-val">-- m</span></div>
        <div id="weather-alert">...</div>
    </div>
    <div id="map"></div>
    <div class="controls">
        <div class="row">
            <button onclick="setParking()">🅿️ APARCAR</button>
            <button class="btn-sec" onclick="openCamera()">📸 FOTO</button>
        </div>
        <div class="row">
            <button class="btn-sec" onclick="addNote()">📝 NOTA</button>
            <button class="btn-sec" onclick="findPlenoil()">⛽ PLENOIL</button>
        </div>
        <div class="row"><button class="btn-danger" onclick="clearParking()">🗑️ BORRAR</button></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map', { zoomControl: false }).setView([38.70, -0.47], 17);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let userMarker = L.circleMarker([0,0], {color: '#0ff', radius: 7, fillOpacity: 0.9}).addTo(map);
        let carMarker = null, routeLine = null, gasMarkers = L.layerGroup().addTo(map);

        const savedPos = JSON.parse(localStorage.getItem('v7_pos'));
        if (savedPos) { carMarker = L.marker(savedPos).addTo(map); getAddress(savedPos.lat, savedPos.lng, true); }

        navigator.geolocation.watchPosition(pos => {
            const {latitude, longitude} = pos.coords;
            userMarker.setLatLng([latitude, longitude]);
            if (!carMarker) map.panTo([latitude, longitude]);
            updateDashboard(latitude, longitude);
        }, null, { enableHighAccuracy: true });

        async function updateDashboard(lat, lon) {
            if (carMarker) {
                const dist = map.distance([lat, lon], carMarker.getLatLng());
                document.getElementById('dist-val').innerText = `${Math.round(dist)}m al coche`;
                if (routeLine) map.removeLayer(routeLine);
                routeLine = L.polyline([[lat, lon], carMarker.getLatLng()], {color: '#0ff', weight: 2, dashArray: '5,10'}).addTo(map);
            }
            updateWeather(lat, lon);
        }

        async function findPlenoil() {
            document.getElementById('status').innerText = "⛽ Buscando Plenoil...";
            gasMarkers.clearLayers();
            try {
                const res = await fetch('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/');
                const data = await res.json();
                const pos = userMarker.getLatLng();
                const filtradas = data.ListaEESSPrecio.filter(g => 
                    g.Rotulo.includes("PLENOIL") && 
                    map.distance([pos.lat, pos.lng], [g.Latitud.replace(',','.'), g['Longitud (WGS84)'].replace(',','.')]) < 15000 
                );
                filtradas.forEach(g => {
                    const gLat = g.Latitud.replace(',','.');
                    const gLon = g['Longitud (WGS84)'].replace(',','.');
                    L.marker([gLat, gLon], {
                        icon: L.divIcon({ className: 'gas-label', html: `⛽ ${g['Precio Gasoleo A']}€` })
                    }).addTo(gasMarkers).bindPopup(`<b>${g.Rotulo}</b><br>G95: ${g['Precio Gasolina 95 E5']}€<br>GOA: ${g['Precio Gasoleo A']}€`);
                });
                if(filtradas.length > 0) {
                    map.fitBounds(gasMarkers.getBounds());
                    document.getElementById('status').innerText = `✅ ${filtradas.length} Plenoil encontradas`;
                }
            } catch (e) { document.getElementById('status').innerText = "❌ Error API"; }
        }

        async function getAddress(lat, lon, isCar) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await res.json();
                document.getElementById('address').innerText = (isCar ? "🚗 en " : "📍 en ") + (data.address.road || "S/N");
            } catch(e){}
        }

        async function updateWeather(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=precipitation_probability`);
                const data = await res.json();
                const rain = data.hourly.precipitation_probability[0];
                document.getElementById('weather-alert').innerText = `🌡️ ${data.current_weather.temperature}ºC` + (rain > 30 ? ` | ⚠️ LLUVIA: ${rain}%` : "");
            } catch(e){}
        }

        function setParking() {
            const coords = userMarker.getLatLng();
            if (carMarker) map.removeLayer(carMarker);
            carMarker = L.marker(coords).addTo(map);
            localStorage.setItem('v7_pos', JSON.stringify(coords));
            getAddress(coords.lat, coords.lng, true);
        }

        function openCamera() { const i = document.createElement('input'); i.type = 'file'; i.accept = 'image/*'; i.capture = 'environment'; i.click(); }
        function addNote() { const n = prompt("Nota:"); if (n) document.getElementById('status').innerText = "📝 " + n; }
        function clearParking() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <title>Parking Bunker</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; }
        
        /* El mapa ocupa TODA la pantalla de fondo */
        #map { 
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            z-index: 1;
        }

        /* El clima flota arriba */
        #weather { 
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #0ff;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #0ff;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            white-space: nowrap;
        }

        /* LOS BOTONES: Ahora flotan ABAJO, por encima del mapa */
        .controls { 
            position: absolute;
            bottom: 30px; /* Separación del borde inferior del móvil */
            left: 0;
            width: 100%;
            display: flex; 
            justify-content: space-around; 
            padding: 0 15px;
            z-index: 1000; /* Prioridad máxima */
        }

        button { 
            background: #0ff; 
            color: #000; 
            border: none; 
            height: 55px; 
            width: 45%; 
            font-weight: bold; 
            border-radius: 12px; 
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        
        button:active { background: #00cccc; }
        .btn-borrar { background: #333; color: #0ff; border: 1px solid #0ff; }
    </style>
</head>
<body>
    <div id="weather">🛰️ BUSCANDO SEÑAL...</div>
    <div id="map"></div>
    <div class="controls">
        <button onclick="setParking()">🅿️ APARCAR</button>
        <button class="btn-borrar" onclick="clearParking()">🗑️ BORRAR</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map', { zoomControl: false }).setView([38.70, -0.47], 17);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        let userMarker = L.circleMarker([0,0], {color: '#0ff', fillColor: '#0ff', fillOpacity: 0.8, radius: 9}).addTo(map);
        let carMarker = null;

        const savedPos = JSON.parse(localStorage.getItem('bunker_car_v4'));
        if (savedPos) { 
            carMarker = L.marker([savedPos.lat, savedPos.lng]).addTo(map); 
        }

        navigator.geolocation.watchPosition(pos => {
            const {latitude, longitude} = pos.coords;
            userMarker.setLatLng([latitude, longitude]);
            if (!carMarker) map.panTo([latitude, longitude]);
            document.getElementById('weather').innerText = `📍 GPS: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
        }, null, { enableHighAccuracy: true });

        function setParking() {
            const coords = userMarker.getLatLng();
            if (carMarker) map.removeLayer(carMarker);
            carMarker = L.marker(coords).addTo(map);
            localStorage.setItem('bunker_car_v4', JSON.stringify(coords));
            alert("Aparcado correctamente.");
        }

        function clearParking() {
            if (carMarker) map.removeLayer(carMarker);
            localStorage.removeItem('bunker_car_v4');
            carMarker = null;
        }
    </script>
</body>
</html>

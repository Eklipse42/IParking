<!DOCTYPE html>
<html lang="es">
<head>
    <title>IParking v3</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: #0ff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
        }
        #weather { 
            height: 40px; 
            line-height: 40px; 
            background: #111; 
            text-align: center; 
            border-bottom: 1px solid #0ff; 
            font-size: 12px;
            font-weight: bold;
        }
        #map { 
            flex: 1; 
            width: 100%; 
        }
        .controls { 
            height: 70px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            background: #000; 
            border-top: 1px solid #0ff;
            padding: 5px;
        }
        button { 
            background: #0ff; 
            color: #000; 
            border: none; 
            height: 50px; 
            width: 46%; 
            font-weight: bold; 
            border-radius: 5px; 
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="weather">CONECTANDO GPS...</div>
    <div id="map"></div>
    <div class="controls">
        <button onclick="setParking()">🅿️ APARCAR</button>
        <button onclick="clearParking()">🗑️ BORRAR</button>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map', { zoomControl: false }).setView([38.70, -0.47], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let userMarker = L.circleMarker([0,0], {color: '#0ff', radius: 8}).addTo(map);
        let carMarker = null;

        const savedPos = JSON.parse(localStorage.getItem('carPos_v3'));
        if (savedPos) { carMarker = L.marker([savedPos.lat, savedPos.lng]).addTo(map); }

        navigator.geolocation.watchPosition(pos => {
            const {latitude, longitude} = pos.coords;
            userMarker.setLatLng([latitude, longitude]);
            if (!carMarker) map.panTo([latitude, longitude]);
            document.getElementById('weather').innerText = `📍 GPS ACTIVO | ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
        }, null, { enableHighAccuracy: true });

        function setParking() {
            const coords = userMarker.getLatLng();
            if (carMarker) map.removeLayer(carMarker);
            carMarker = L.marker(coords).addTo(map);
            localStorage.setItem('carPos_v3', JSON.stringify(coords));
            alert("Posición guardada");
        }
        function clearParking() {
            if (carMarker) map.removeLayer(carMarker);
            localStorage.removeItem('carPos_v3');
            carMarker = null;
        }
    </script>
</body>
</html>

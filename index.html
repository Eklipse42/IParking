<!DOCTYPE html>
<html lang="es">
<head>
    <title>IParking Búnker v7</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; }
        
        /* Mapa con filtro oscuro */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        #info-panel { 
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 20, 20, 0.95); color: #0ff; padding: 12px;
            border-radius: 12px; border: 1px solid #0ff; font-family: monospace;
            font-size: 11px; z-index: 1000; text-align: center; width: 90%;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        .controls { 
            position: absolute; bottom: 20px; left: 0; width: 100%;
            display: flex; flex-direction: column; gap: 8px; padding: 0 12px; z-index: 1000;
        }
        .row { display: flex; justify-content: space-around; gap: 8px; }

        button { 
            background: #0ff; color: #000; border: none; height: 50px; flex: 1;
            font-weight: bold; border-radius: 8px; font-size: 13px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        
        .btn-sec { background: #1a1a1a; color: #0ff; border: 1px solid #0ff; }
        .btn-danger { background: #1a1a1a; color: #ff4444; border: 1px solid #ff4444; }
        button:active { transform: scale(0.92); }

        #address { font-weight: bold; color: #fff; margin-bottom: 4px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #weather-alert { color: #ffcc00; font-size: 10px; margin-top: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="info-panel">
        <div id="address">📍 Localizando calle...</div>
        <div id="status">🛰️ GPS OK | <span id="dist-val">-- m</span></div>
        <div id="weather-alert">Cargando clima...</div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <div class="row">
            <button onclick="setParking()">🅿️ APARCAR</button>
            <button class="btn-sec" onclick="openCamera()">📸 FOTO</button>
        </div>
        <div class="row">
            <button class="btn-sec" onclick="addNote()">📝 NOTA</button>
            <button class="btn-sec" onclick="findPlenoil()">⛽ PLENOIL</button>
        </div>
        <div class="row">
            <button class="btn-danger" onclick="clearParking()">🗑️ BORRAR</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map', { zoomControl: false }).setView([38.70, -0.47], 17);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        let userMarker = L.circleMarker([0,0], {color: '#0ff', fillColor: '#0ff', fillOpacity: 0.9, radius: 7}).addTo(map);
        let carMarker = null;
        let routeLine = null;

        const savedPos = JSON.parse(localStorage.getItem('v7_pos'));
        if (savedPos) { 
            carMarker = L.marker(savedPos).addTo(map);
            getAddress(savedPos.lat, savedPos.lng, true);
        }

        navigator.geolocation.watchPosition(pos => {
            const {latitude, longitude} = pos.coords;
            userMarker.setLatLng([latitude, longitude]);
            if (!carMarker) map.panTo([latitude, longitude]);
            
            updateDashboard(latitude, longitude);
        }, null, { enableHighAccuracy: true });

        async function updateDashboard(lat, lon) {
            if (carMarker) {
                const dist = map.distance([lat, lon], carMarker.getLatLng());
                document.getElementById('dist-val').innerText = `${Math.round(dist)}m al coche`;
                if (routeLine) map.removeLayer(routeLine);
                routeLine = L.polyline([[lat, lon], carMarker.getLatLng()], {color: '#0ff', weight: 2, dashArray: '5, 10'}).addTo(map);
            }
            // Clima y Avisos
            updateWeather(lat, lon);
        }

        async function getAddress(lat, lon, isCar) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await res.json();
                const street = data.address.road || "Calle desconocida";
                document.getElementById('address').innerText = isCar ? `🚗 en ${street}` : `📍 en ${street}`;
            } catch (e) { }
        }

        async function updateWeather(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=precipitation_probability`);
                const data = await res.json();
                const temp = data.current_weather.temperature;
                const rainProb = data.hourly.precipitation_probability[0];
                let alertMsg = `🌡️ ${temp}ºC`;
                if(rainProb > 30) alertMsg += ` | ⚠️ LLUVIA: ${rainProb}%`;
                document.getElementById('weather-alert').innerText = alertMsg;
            } catch (e) { }
        }

        function setParking() {
            const coords = userMarker.getLatLng();
            if (carMarker) map.removeLayer(carMarker);
            carMarker = L.marker(coords).addTo(map);
            localStorage.setItem('v7_pos', JSON.stringify(coords));
            getAddress(coords.lat, coords.lng, true);
        }

        function findPlenoil() {
            const pos = userMarker.getLatLng();
            window.open(`https://www.google.com/maps/search/Plenoil/@${pos.lat},${pos.lng},14z`);
        }

        function openCamera() {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
            input.click();
        }

        function addNote() {
            const note = prompt("Nota de plaza:");
            if (note) document.getElementById('status').innerText = "📝 " + note;
        }

        function clearParking() {
            if (carMarker) map.removeLayer(carMarker);
            if (routeLine) map.removeLayer(routeLine);
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>

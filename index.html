<!DOCTYPE html>
<html lang="es">
<head>
    <title>IParking 2026</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Estructura fija para evitar que los botones desaparezcan */
        * { box-sizing: border-box; }
        body { 
            background: #0b110b; 
            color: #00ff00; 
            font-family: monospace; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
        }

        #weather { 
            height: 50px; 
            line-height: 50px; 
            background: #1a2a1a; 
            text-align: center; 
            border-bottom: 2px solid #00ff00; 
            font-size: 14px; 
            font-weight: bold;
        }

        #map { 
            flex: 1; /* El mapa ocupa todo el espacio restante */
            width: 100%; 
        }

        .controls { 
            height: 90px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            background: #0b110b; 
            border-top: 2px solid #00ff00; 
            padding: 10px;
        }

        button { 
            background: #00ff00; 
            color: #000; 
            border: none; 
            height: 60px; 
            width: 45%; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 14px;
            text-transform: uppercase;
        }

        button:active { 
            background: #00cc00; 
            transform: scale(0.95); 
        }
    </style>
</head>
<body>
    <div id="weather">🛰️ Localizando...</div>
    <div id="map"></div>
    <div class="controls">
        <button onclick="setParking()">🅿️ APARCAR</button>
        <button onclick="clearParking()">🗑️ BORRAR</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Configuración del mapa centrada en Alcoy por defecto
        let map = L.map('map', { zoomControl: false }).setView([38.70, -0.47], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let userMarker = L.circleMarker([0,0], {color: '#00ff00', fillColor: '#00ff00', fillOpacity: 0.9, radius: 10}).addTo(map);
        let carMarker = null;

        // Recuperar posición guardada
        const savedPos = JSON.parse(localStorage.getItem('carPos_v1'));
        if (savedPos) {
            carMarker = L.marker([savedPos.lat, savedPos.lng]).addTo(map).bindPopup("MI COCHE").openPopup();
        }

        // GPS en tiempo real
        navigator.geolocation.watchPosition(pos => {
            const {latitude, longitude} = pos.coords;
            userMarker.setLatLng([latitude, longitude]);
            // Solo centra el mapa automáticamente si no hay un coche marcado
            if (!carMarker) map.panTo([latitude, longitude]);
            updateWeather(latitude, longitude);
        }, err => {
            document.getElementById('weather').innerText = "❌ ACTIVA GPS";
        }, { enableHighAccuracy: true });

        function setParking() {
            const coords = userMarker.getLatLng();
            if (carMarker) map.removeLayer(carMarker);
            carMarker = L.marker(coords).addTo(map).bindPopup("APARCADO").openPopup();
            localStorage.setItem('carPos_v1', JSON.stringify(coords));
        }

        function clearParking() {
            if (carMarker) map.removeLayer(carMarker);
            localStorage.removeItem('carPos_v1');
            carMarker = null;
        }

        async function updateWeather(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await res.json();
                const t = data.current_weather.temperature;
                document.getElementById('weather').innerText = `🌡️ ${t}ºC | 📍 GPS OK`;
            } catch (e) { }
        }
    </script>
</body>
</html>
